<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Desktop Portofolio</title>
    <!-- Library Ikon Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Berdasarkan Source 2 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)),
                        url('https://images.unsplash.com/photo-1635805737707-575885ab0820?q=80&w=1000') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            color: white;
            overflow: hidden;
        }

        /* Tata letak grid untuk 4 widget [1] */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin: auto;
        }

        /* Gaya Widget Glassmorphism [1] */
        .widget {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 120px;
        }

        /* Gaya Navigasi Bawah [2] */
        .bottom-nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 25px;
            display: flex;
            gap: 20px;
            width: fit-content;
            margin: 0 auto 20px auto;
        }

        .bottom-nav i { font-size: 20px; opacity: 0.7; cursor: pointer; transition: 0.3s; }
        .bottom-nav i:hover { opacity: 1; transform: scale(1.2); }

        .controls { display: flex; gap: 15px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Elemen Audio untuk Musik -->
    <!-- Pastikan file musik.mp3 ada di folder yang sama -->
    <!-- Elemen Audio untuk Musik -->
<audio id="my-audio" crossorigin="anonymous" src="https://raw.githubusercontent.com/Zgove-Web/hosted-assets/main/mltr-thats-why.mp3"></audio>

    <div class="main-container">
        <!-- Widget Waktu [2] -->
        <div class="widget" style="padding: 0; overflow: hidden;">
    <iframe style="border-radius:12px" 
        src="https://open.spotify.com/embed/track/2ZY9p6968yA7_2C87c_339?utm_source=generator&theme=0" 
        width="100%" height="152" frameBorder="0" allowfullscreen="" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
        loading="lazy">
    </iframe>
</div>

        <!-- Widget Tanggal [2] -->
        <div class="widget">
            <h3 id="day">Sabtu</h3>
            <p id="date" style="font-size: 0.9rem; color: #ff4d4d; font-weight: bold;">27 Juni 2026</p>
        </div>

        <!-- Widget Cuaca [2] -->
        <div class="widget">
            <i class="fas fa-cloud-sun" style="font-size: 2rem; color: #ffcc00; margin-bottom: 5px;"></i>
            <h3>33°C</h3>
            <p style="font-size: 0.8rem;">Cimahi, ID</p>
        </div>

        <!-- Widget Musik [2] -->
        <div class="widget">
            <i class="fas fa-music" style="color: #1DB954; margin-bottom: 5px;"></i>
            <p style="font-size: 0.85rem; font-weight: bold;">That's Why (You Go...)</p>
            <p style="font-size: 0.7rem; opacity: 0.7;">Michael Learns to Rock</p>
            <div class="controls">
                <i class="fas fa-backward"></i>
                <i class="fas fa-play" id="playBtn"></i>
                <i class="fas fa-forward"></i>
            </div>
        </div>
    </div>

    <!-- Bar Navigasi Bawah [2] -->
    <div class="bottom-nav">
        <i class="fab fa-github"></i>
        <i class="fab fa-linkedin"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-whatsapp"></i>
        <i class="fab fa-spotify"></i>
    </div>

    <script>
        // Logika untuk memutar musik
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');

        playBtn.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                playBtn.classList.replace('fa-play', 'fa-pause');
            } else {
                audio.pause();
                playBtn.classList.replace('fa-pause', 'fa-play');
            }
        });

        // (Opsional) Update jam secara otomatis
        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0');
            document.getElementById('time').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
    </script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Desktop Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1635805737707-575885ab0820?q=80&w=1000') no-repeat center center/cover;
            height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; color: white; overflow: hidden;
        }
        .main-container { display: flex; justify-content: space-between; width: 100%; height: 80%; }
        .left-widgets, .right-widgets { display: flex; flex-direction: column; gap: 20px; width: 260px; }
        .widget {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 20px; text-align: center;
        }
        .clock-widget h1 { font-size: 2.8rem; font-weight: 600; }
        .weather-widget i { font-size: 2rem; margin-bottom: 10px; color: #ffb703; }
        .music-widget { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .music-controls { display: flex; gap: 20px; font-size: 1.2rem; cursor: pointer; }
        .music-controls i:hover { color: #1db954; }
        .dock-container { display: flex; justify-content: center; width: 100%; padding-bottom: 10px; }
        .dock {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 12px 25px; border-radius: 24px; display: flex; gap: 25px;
        }
        .dock-icon { font-size: 2.2rem; color: white; cursor: pointer; transition: transform 0.2s; text-decoration: none; }
        .dock-icon:hover { transform: scale(1.3) translateY(-10px); color: #00adb5; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="left-widgets">
            <div class="widget clock-widget">
                <h1 id="time">10:54</h1>
                <p style="opacity: 0.7; font-size: 0.9rem;">WIB</p>
            </div>
            <div class="widget weather-widget">
                <i class="fas fa-cloud-sun"></i>
                <h3>33°C</h3>
                <p style="opacity: 0.7; font-size: 0.9rem;">Cimahi, ID</p>
            </div>
        </div>
        <div class="right-widgets">
            <div class="widget">
                <h3 style="margin-bottom: 5px;">Sabtu</h3>
                <h4 style="color: #ff4757;">27 Juni 2026</h4>
            </div>
            <div class="widget music-widget">
                <i class="fas fa-music" style="font-size: 1.5rem; color: #1db954;"></i>
                <div>
                    <h5 style="font-size: 0.9rem;">That's Why (You Go...)</h5>
                    <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 2px;">Michael Learns to Rock</p>
                </div>
                <div class="music-controls">
                    <i class="fas fa-backward"></i>
                    <i class="fas fa-play" id="play-btn"></i>
                    <i class="fas fa-forward"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="dock-container">
        <div class="dock">
            <a href="https://github.com" target="_blank" class="fab fa-github dock-icon" title="GitHub"></a>
            <a href="https://linkedin.com" target="_blank" class="fab fa-linkedin dock-icon" title="LinkedIn"></a>
            <a href="https://instagram.com" target="_blank" class="fab fa-instagram dock-icon" title="Instagram"></a>
            <a href="https://whatsapp.com" target="_blank" class="fab fa-whatsapp dock-icon" title="WhatsApp"></a>
            <a href="https://spotify.com" target="_blank" class="fab fa-spotify dock-icon" title="Spotify"></a>
        </div>
    </div>
    <script>
        function updateTime() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('time').innerText = hours + ':' + minutes;
        }
        setInterval(updateTime, 1000);
    </script>
</body>
</html>

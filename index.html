<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Desktop Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1635805737707-575885ab0820?q=80&w=1000') no-repeat center center/cover;
            height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; color: white; overflow: hidden;
        }
        .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; margin: 0 auto; margin-top: 10px; }
        .widget {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 20px; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 120px;
        }
        .clock-widget h1 { font-size: 2.5rem; font-weight: 600; line-height: 1.1; }
        .clock-widget p { font-size: 0.8rem; opacity: 0.6; margin-top: 4px; }
        .date-widget h3 { font-size: 1.2rem; font-weight: 600; }
        .date-widget h4 { font-size: 0.9rem; color: #ff4757; margin-top: 4px; }
        .weather-widget i { font-size: 1.8rem; margin-bottom: 8px; color: #ffb703; }
        .weather-widget h3 { font-size: 1.2rem; }
        .weather-widget p { font-size: 0.8rem; opacity: 0.6; }
        
        /* Spotify Widget Container */
        .music-widget-spotify {
            grid-column: span 2; /* Memanjang ke bawah agar pas dengan bentuk player */
            background: transparent;
            border: none;
            width: 100%;
            height: 85px;
        }

        /* Dock */
        .dock-container { display: flex; justify-content: center; width: 100%; padding-bottom: 20px; }
        .dock {
            background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18); padding: 12px 25px; border-radius: 24px;
            display: flex; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .dock-icon { font-size: 1.8rem; color: white; cursor: pointer; transition: transform 0.2s; text-decoration: none; }
        .dock-icon:hover { transform: scale(1.2) translateY(-5px); color: #00adb5; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Jam -->
        <div class="widget clock-widget">
            <h1 id="time">00:00</h1>
            <p>WIB</p>
        </div>
        <!-- Tanggal -->
        <div class="widget date-widget">
            <h3 id="day-name">Sabtu</h3>
            <h4 id="full-date">27 Juni 2026</h4>
        </div>
        <!-- Cuaca -->
        <div class="widget weather-widget">
            <i class="fas fa-cloud-sun"></i>
            <h3>33°C</h3>
            <p>Cimahi, ID</p>
        </div>
        
        <!-- WIDGET SPOTIFY ASLI (Bisa di-play langsung & anti-error) -->
        <div class="music-widget-spotify">
            <iframe style="border-radius:15px" src="https://open.spotify.com/embed/track/2Z769POf9V57377O7-5758?utm_source=generator&theme=1" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

    <!-- Dock Menu Medsos -->
    <div class="dock-container">
        <div class="dock">
            <a href="https://github.com" target="_blank" class="fab fa-github dock-icon" title="GitHub"></a>
            <a href="https://linkedin.com" target="_blank" class="fab fa-linkedin dock-icon" title="LinkedIn"></a>
            <a href="https://instagram.com" target="_blank" class="fab fa-instagram dock-icon" title="Instagram"></a>
            <a href="https://whatsapp.com" target="_blank" class="fab fa-whatsapp dock-icon" title="WhatsApp"></a>
            <a href="https://spotify.com" target="_blank" class="fab fa-spotify dock-icon" title="Spotify"></a>
        </div>
    </div>

    <script>
        // Update Waktu Nyata Otomatis
        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            
            document.getElementById('day-name').innerText = days[now.getDay()];
            document.getElementById('full-date').innerText = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
        }
        setInterval(updateTime, 1000); 
        updateTime();
    </script>
</body>
</html>
